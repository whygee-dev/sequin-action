name: "Sequin Service Setup"
description: "Sets up Sequin service with PostgreSQL and Redis"

outputs:
  metrics-port:
    description: "The metrics port selected for Sequin"
    value: ${{ steps.metrics-port.outputs.value }}

inputs:
  sequin-version:
    description: "Version of Sequin to use"
    required: true
    default: "v0.14.6"
  pg-password:
    description: "Sequin's PostgreSQL password"
    required: true
    default: "sequin"
  secret-key-base:
    description: "Sequin's secret key base"
    required: true
    default: "wDPLYus0pvD6qJhKJICO4dauYPXfO/Yl782Zjtpew5qRBDp7CZvbWtQmY0eB13If"
  vault-key:
    description: "Sequin's vault key"
    required: true
    default: "2Sig69bIpuSm2kv0VQfDekET2qy8qUZGI8v3/h3ASiY="
  config-file:
    description: "Path to config file"
    required: true
  health-check-timeout:
    description: "Timeout in seconds for health check"
    required: false
    default: "30"
  metrics-port:
    description: "Metrics port for Sequin. Defaults to the first free port from a built-in shortlist."
    required: false
    default: ""
  docker-hub-username:
    description: "Docker Hub username for authentication"
    required: false
  docker-hub-password:
    description: "Docker Hub password or personal access token (PAT) for authentication"
    required: false

runs:
  using: "composite"
  steps:
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1

    - name: Login to Docker Hub
      if: inputs.docker-hub-username != '' && inputs.docker-hub-password != ''
      shell: bash
      run: |
        echo "${{ inputs.docker-hub-password }}" | docker login -u ${{ inputs.docker-hub-username }} --password-stdin

    - name: Resolve Sequin metrics port
      id: metrics-port
      shell: bash
      run: |
        requested_port="${{ inputs.metrics-port }}"
        candidate_ports=(8376 18376 28376 38376 48376)

        port_in_use() {
          local port="$1"

          if command -v lsof >/dev/null 2>&1; then
            lsof -nP -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1
            return
          fi

          if command -v ss >/dev/null 2>&1; then
            ss -ltn "( sport = :$port )" | tail -n +2 | grep -q .
            return
          fi

          echo "Neither lsof nor ss is available to probe TCP ports" >&2
          exit 1
        }

        validate_port() {
          [[ "$1" =~ ^[0-9]+$ ]] && [ "$1" -ge 1 ] && [ "$1" -le 65535 ]
        }

        metrics_port=""
        if [ -n "$requested_port" ]; then
          if ! validate_port "$requested_port"; then
            echo "metrics-port must be an integer between 1 and 65535" >&2
            exit 1
          fi

          if port_in_use "$requested_port"; then
            echo "Requested metrics-port $requested_port is already in use" >&2
            exit 1
          fi

          metrics_port="$requested_port"
        else
          for port in "${candidate_ports[@]}"; do
            if ! port_in_use "$port"; then
              metrics_port="$port"
              break
            fi
          done

          if [ -z "$metrics_port" ]; then
            echo "Could not find a free Sequin metrics port from: ${candidate_ports[*]}" >&2
            echo "Set the metrics-port input to an available TCP port." >&2
            exit 1
          fi
        fi

        echo "Using Sequin metrics port: $metrics_port"
        echo "value=$metrics_port" >> "$GITHUB_OUTPUT"

    - name: Create docker-compose file
      shell: bash
      run: |
        cat > docker-compose.yml << EOL
        version: '3.8'
        services:
          sequin:
            image: sequin/sequin:${{ inputs.sequin-version }}
            network_mode: host
            environment:
              - PG_HOSTNAME=localhost
              - PG_DATABASE=sequin
              - PG_PORT=7377
              - PG_USERNAME=sequin
              - PG_PASSWORD=${{ inputs.pg-password }}
              - PG_POOL_SIZE=20
              - SECRET_KEY_BASE=${{ inputs.secret-key-base }}
              - VAULT_KEY=${{ inputs.vault-key }}
              - REDIS_URL=redis://localhost:7378
              - CONFIG_FILE_PATH=/config/config.local.yml
              - SEQUIN_METRICS_PORT=${{ steps.metrics-port.outputs.value }}
            volumes:
              - ${{ inputs.config-file }}:/config/config.local.yml
            depends_on:
              sequin_postgres:
                condition: service_healthy
              sequin_redis:
                condition: service_started
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost:7376/health"]
              interval: 10s
              timeout: 5s
              retries: 5
              start_period: 10s

          sequin_postgres:
            image: postgres:16-alpine
            network_mode: host
            environment:
              - POSTGRES_DB=sequin
              - POSTGRES_USER=sequin
              - POSTGRES_PASSWORD=${{ inputs.pg-password }}
              - PGPORT=7377

            command: ["postgres", "-c", "wal_level=logical"]
            healthcheck:
              test: ["CMD-SHELL", "pg_isready -U sequin -d sequin"]
              interval: 10s
              timeout: 2s
              retries: 5
              start_period: 2s
              start_interval: 1s

          sequin_redis:
            image: redis:7
            network_mode: host
            command: ["redis-server", "--port", "7378"]
        EOL

    - name: Start services
      shell: bash
      run: docker compose up -d

    - name: Check for healthy sequin service for ${{ inputs.health-check-timeout }} seconds, show logs if not healthy
      shell: bash
      run: |
        timeout=${{ inputs.health-check-timeout }}
        while [ $timeout -gt 0 ]; do
          if curl -s -f http://127.0.0.1:7376/health > /dev/null; then
            echo "Sequin service is healthy"
            exit 0
          fi
          if [ $((timeout % 60)) -eq 0 ]; then
            echo "Latest Sequin logs:"
            docker compose logs --tail=100 sequin
          fi
          sleep 1
          timeout=$((timeout-1))
        done
        echo "Sequin service is not healthy after $timeout seconds"
        echo "Final Sequin logs:"
        docker compose logs sequin
        exit 1
